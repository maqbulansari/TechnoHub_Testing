name: Frontend CI

on:
  push:
    branches: [main]

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t frontend:test .

      - name: Run container for health check
        run: |
          docker run -d --name fe-test -p 18080:80 frontend:test
          sleep 5
          curl -f http://localhost:18080
          docker rm -f fe-test

      # ✅ ONLY AFTER HEALTH PASS
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push production image
        run: |
          docker build -t sameerei/technohub-frontend:latest .
          docker push sameerei/technohub-frontend:latest

      - name: Trigger Infra Deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.INFRA_TRIGGER_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Sameer-EI/technohub-deployment-infra/dispatches \
            -d '{"event_type":"deploy"}'

